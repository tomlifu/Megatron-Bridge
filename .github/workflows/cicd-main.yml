          script: ${{ matrix.script }}
          timeout: ${{ fromJSON(matrix.timeout || '30') }}
          is_unit_test: "false"
          has-azure-credentials: ${{ contains(needs.pre-flight.outputs.registry, 'azure') }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
